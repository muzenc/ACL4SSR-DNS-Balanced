[custom]
; Clash / Shadowrocket / ACL4SSR balanced DNS routing template
; 目标：国内优先直连、未知域名允许 GEOIP 解析、国外未知流量默认走代理

exclude_remarks=(剩余流量|到期时间|官网|Traffic|Expire|Reset)
add_emoji=true
remove_old_emoji=false

clash_rule_base=https://raw.githubusercontent.com/muzenc/ACL4SSR-DNS-Balanced/main/Clash_DNS_Balanced.yml

custom_proxy_group=✈️ 代理`select`[]⚡ 自动选择`[]👆 手动选择`[]DIRECT`[]REJECT
custom_proxy_group=⚡ 自动选择`url-test`^`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=👆 手动选择`select`^
custom_proxy_group=🎯 国内`select`[]DIRECT`[]✈️ 代理
custom_proxy_group=🛑 广告`select`[]REJECT`[]DIRECT`[]✈️ 代理
custom_proxy_group=📺 B站`select`[]🎯 国内`[]✈️ 代理`[]👆 手动选择
custom_proxy_group=🤖 AI`select`[]✈️ 代理`[]👆 手动选择`[]🎯 国内
custom_proxy_group=🌐 未知站点`select`[]✈️ 代理`[]🎯 国内`[]🛑 广告

enable_rule_generator=true
overwrite_original_rules=true

ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=DIRECT,[]DOMAIN-SUFFIX,todesk.com
ruleset=🎯 国内,https://raw.githubusercontent.com/zsokami/ACL4SSR/main/ChinaOnly.list
ruleset=🎯 国内,https://raw.githubusercontent.com/zsokami/ACL4SSR/main/UnBan1.list
ruleset=🎯 国内,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🛑 广告,https://raw.githubusercontent.com/zsokami/ACL4SSR/main/BanProgramAD1.list
ruleset=🛑 广告,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🛑 广告,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
ruleset=🎯 国内,https://raw.githubusercontent.com/zsokami/ACL4SSR/main/GoogleCN.list
ruleset=🎯 国内,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/SteamCN.list
ruleset=📺 B站,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/BilibiliHMT.list
ruleset=📺 B站,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Bilibili.list
ruleset=🤖 AI,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AI.list
ruleset=✈️ 代理,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
ruleset=🎯 国内,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 国内,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 国内,[]GEOIP,CN
ruleset=🌐 未知站点,[]FINAL
