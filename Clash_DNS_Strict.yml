# Clash subscription base for Shadowrocket strict DNS privacy
# 业务域名全部使用经代理转发的境外 DoH；国内 DNS 仅解析代理节点域名

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: redir-host
  nameserver:
    - "https://dns.google/dns-query#proxy"
  fallback:
    - "https://cloudflare-dns.com/dns-query#proxy"
  proxy-server-nameserver:
    - https://1.12.12.12/dns-query
